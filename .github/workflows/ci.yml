name: CI

on:
  pull_request:
  push:
    branches:
      - developer
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: jobnow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d jobnow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci-32chars-placeholder
          POSTGRES_URL: postgresql://test_user:test_password@localhost:5432/jobnow_test
          SENDGRID_API_KEY: SG.test-fake-key
          EMAIL_FROM: test@test.invalid
          TWILIO_ACCOUNT_SID: ACtest000000000000000000000000000000
          TWILIO_AUTH_TOKEN: test-auth-token-fake
          TWILIO_VERIFY_SERVICE_SID: VAtest000000000000000000000000000000
          VITE_APP_ID: test-app-id
          OAUTH_SERVER_URL: http://localhost:9999
          VITE_OAUTH_PORTAL_URL: http://localhost:9999
          OWNER_OPEN_ID: test-owner
          OWNER_NAME: Test Owner
          BUILT_IN_FORGE_API_URL: http://localhost:9999
          BUILT_IN_FORGE_API_KEY: test-forge-key
          VITE_FRONTEND_FORGE_API_KEY: test-frontend-key
          VITE_FRONTEND_FORGE_API_URL: http://localhost:9999

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Apply DB migrations (test DB)
        run: pnpm db:push:test
        env:
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/jobnow_test

      - name: Run tests
        run: pnpm test && pnpm test:integration
        env:
          NODE_ENV: test
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/jobnow_test
          JWT_SECRET: test-jwt-secret-ci-32chars-placeholder
          POSTGRES_URL: postgresql://test_user:test_password@localhost:5432/jobnow_test
          SENDGRID_API_KEY: SG.test-fake-key
          EMAIL_FROM: test@test.invalid
          TWILIO_ACCOUNT_SID: ACtest000000000000000000000000000000
          TWILIO_AUTH_TOKEN: test-auth-token-fake
          TWILIO_VERIFY_SERVICE_SID: VAtest000000000000000000000000000000
          VITE_APP_ID: test-app-id
          OAUTH_SERVER_URL: http://localhost:9999
          VITE_OAUTH_PORTAL_URL: http://localhost:9999
          OWNER_OPEN_ID: test-owner
          OWNER_NAME: Test Owner
          BUILT_IN_FORGE_API_URL: http://localhost:9999
          BUILT_IN_FORGE_API_KEY: test-forge-key
          VITE_FRONTEND_FORGE_API_KEY: test-frontend-key
          VITE_FRONTEND_FORGE_API_URL: http://localhost:9999
