# ─────────────────────────────────────────────────────────────────────────────
# integration.yml — Integration Tests
#
# Runs on:
#   - Every pull request (any branch → main)
#   - Every push to main
#
# Steps:
#   1. Spin up PostgreSQL 16 + PostGIS service container
#   2. Install dependencies (pnpm)
#   3. Apply drizzle migrations to test DB
#   4. Run integration tests (vitest --config vitest.integration.config.ts)
#
# No production secrets needed — uses fake credentials from .env.test.
# The test DB is ephemeral and destroyed after the job completes.
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  integration-tests:
    name: Integration Tests (PostgreSQL + PostGIS)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: jobnow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d jobnow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Apply drizzle migrations to test DB
        run: pnpm db:push:test
        env:
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/jobnow_test

      - name: Run integration tests
        run: pnpm test:integration
        env:
          # Test DB — ephemeral PostgreSQL service container
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/jobnow_test
          # Auth
          JWT_SECRET: test-jwt-secret-ci-do-not-use-in-production-32chars
          # All external services are mocked in integration tests
          NODE_ENV: test
          SENDGRID_API_KEY: SG.test-fake-key-not-real
          EMAIL_FROM: test@test.invalid
          TWILIO_ACCOUNT_SID: ACtest00000000000000000000000000000
          TWILIO_AUTH_TOKEN: test-auth-token-fake
          TWILIO_VERIFY_SERVICE_SID: VAtest0000000000000000000000000000
          VITE_APP_ID: test-app-id
          OAUTH_SERVER_URL: http://localhost:9999/mock-oauth
          VITE_OAUTH_PORTAL_URL: http://localhost:9999/mock-portal
          OWNER_OPEN_ID: test-owner-open-id
          OWNER_NAME: Test Owner
          BUILT_IN_FORGE_API_URL: http://localhost:9999/mock-forge
          BUILT_IN_FORGE_API_KEY: test-forge-key-fake
          VITE_FRONTEND_FORGE_API_KEY: test-frontend-forge-key-fake
          VITE_FRONTEND_FORGE_API_URL: http://localhost:9999/mock-forge
