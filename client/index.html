    <!-- Fonts: non-blocking load to avoid render-blocking -->

         Frank Ruhl Libre 700+900 covers display headings only. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts asynchronously: media=print trick swaps to all after load -->

  </head>

  <body dir="rtl">
    <!--
      SSR shell: full above-fold layout visible before JS loads.
      Renders navbar + hero heading + subtitle + CTA immediately on HTML parse.
      Fades out once React mounts. OUTSIDE #root — no hydration conflict.
    -->
    <div id="ssr-shell" aria-hidden="true" style="
      position:fixed;inset:0;z-index:9999;
      background:oklch(0.97 0.01 84.0);
      font-family:'Heebo',system-ui,sans-serif;
      direction:rtl;
      overflow:hidden;
    ">
      <!-- Navbar shell -->
      <nav style="
        display:flex;align-items:center;justify-content:space-between;
        padding:0.75rem 1.25rem;
        background:oklch(0.22 0.06 84.0);
        height:56px;
      ">
        <span style="font-size:1.25rem;font-weight:800;color:#fff;letter-spacing:-0.02em">
          Avoda<span style="color:oklch(0.75 0.15 84.0)">Now</span>
        </span>
        <div style="width:32px;height:32px;border-radius:50%;background:oklch(0.35 0.08 84.0)"></div>
      </nav>
      <!-- Hero section -->
      <div style="
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        padding:3rem 1.5rem 2rem;
        text-align:center;
        min-height:calc(100vh - 56px);
      ">
        <!-- Badge -->
        <div style="
          display:inline-block;padding:0.35rem 1rem;
          background:oklch(0.92 0.04 84.0);
          border-radius:9999px;font-size:0.8rem;font-weight:600;
          color:oklch(0.35 0.1 84.0);margin-bottom:1.25rem;
        ">הפלטפורמה לעבודות זמניות בישראל ⚡</div>
        <!-- LCP: Main heading — visible immediately, no JS needed -->
        <h1 style="
          font-size:clamp(2rem,6vw,3rem);font-weight:900;
          color:oklch(0.18 0.05 84.0);line-height:1.15;
          margin:0 0 1rem;max-width:600px;
        ">מצא עבודה<br/>או עובדים עכשיו</h1>
        <!-- Subtitle -->
        <p style="
          font-size:clamp(1rem,2.5vw,1.2rem);
          color:oklch(0.42 0.04 84.0);margin:0 0 2rem;
          max-width:440px;line-height:1.6;
        ">חיבור ישיר בין עובדים למעסיקים — ללא עמלות, ללא מתווכים</p>
        <!-- CTA buttons -->
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center">
          <a href="/find-jobs" style="
            display:inline-flex;align-items:center;gap:0.5rem;
            padding:0.85rem 2rem;
            background:oklch(0.35 0.1 84.0);color:#fff;
            border-radius:9999px;font-size:1rem;font-weight:700;
            text-decoration:none;border:none;
          ">מצא עבודה עכשיו ←</a>
          <a href="/post-job" style="
            display:inline-flex;align-items:center;gap:0.5rem;
            padding:0.85rem 2rem;
            background:transparent;color:oklch(0.35 0.1 84.0);
            border:2px solid oklch(0.35 0.1 84.0);
            border-radius:9999px;font-size:1rem;font-weight:700;
            text-decoration:none;
          ">פרסם משרה</a>
        </div>
        <!-- Loading indicator (subtle, below CTA) -->
        <div style="margin-top:2.5rem;display:flex;align-items:center;gap:0.5rem;color:oklch(0.6 0.03 84.0);font-size:0.85rem">
          <span style="width:14px;height:14px;border:2px solid oklch(0.8 0.03 84.0);border-top-color:oklch(0.45 0.08 84.0);border-radius:50%;display:inline-block;animation:ssr-spin 0.8s linear infinite"></span>
          טוען...
        </div>
      </div>
    </div>
    <div id="root"></div>
    <style>
      @keyframes ssr-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Remove SSR shell once React mounts into #root.
      // Shell is now OUTSIDE #root so no hydration conflict with createRoot.
      (function() {
        var root = document.getElementById('root');
        var observer = new MutationObserver(function() {
          var shell = document.getElementById('ssr-shell');
          if (shell && root && root.children.length > 0) {
            shell.style.opacity = '0';
            shell.style.transition = 'opacity 0.2s';
            setTimeout(function() { shell && shell.remove(); }, 200);
            observer.disconnect();
          }
        });
        if (root) observer.observe(root, { childList: true, subtree: false });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics script is injected dynamically by CookieConsentBanner only when analyticsConsent=true -->
  </body>
